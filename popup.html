<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Guardar Enlace</title>
  <style>
    body { font-family: sans-serif; padding: 10px; width: 250px; }
    input, button { width: 100%; margin-bottom: 10px; padding: 5px; }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 5px; }
    a { word-break: break-all; font-size: 0.9em; }
  </style>
</head>
<body>
  <input type="text" id="inputEnlace" placeholder="Pega un enlace aquí" />
  <button id="guardarBtn">Guardar enlace</button>
  <button id="abrirTodosBtn" style="background-color: #4CAF50; color: white;">Abrir todos</button>
  <ul id="listaEnlaces"></ul>
  <script src="popup.js"></script>
</body>
</html>
